version: '3.8'

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: satellite_postgis
    environment:
      POSTGRES_DB: satellite_cd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: satellite_chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  postgis_data:
  chroma_data:
